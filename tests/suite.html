<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Goblin Physics — Test Suite</title>
	<style>
		* { box-sizing: border-box; }
		html, body { margin: 0; height: 100%; font-family: monospace; background: #0d1117; color: #c9d1d9; }
		#app { display: flex; height: 100%; }

		/* ---- left: test list ---- */
		#sidebar { width: 460px; min-width: 360px; display: flex; flex-direction: column; border-right: 1px solid #21262d; }
		#sidebar .top { padding: 12px 12px 8px; border-bottom: 1px solid #21262d; }
		h1 { font-size: 15px; margin: 0 0 10px; color: #9fe7ff; }
		.controls { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
		.controls button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 5px 9px; cursor: pointer; font-family: monospace; font-size: 12px; border-radius: 4px; }
		.controls button.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
		.controls button:hover { border-color: #8b949e; }
		#testNow { width: 100%; background: #238636; border: 1px solid #2ea043; color: #fff; padding: 8px; font-size: 13px; font-weight: bold; border-radius: 5px; cursor: pointer; font-family: monospace; }
		#testNow:hover { background: #2ea043; }
		#testNow:disabled { background: #21262d; border-color: #30363d; color: #8b949e; cursor: default; }
		#quickTest { width: 100%; margin-top: 6px; background: #1f6feb; border: 1px solid #388bfd; color: #fff; padding: 8px; font-size: 13px; font-weight: bold; border-radius: 5px; cursor: pointer; font-family: monospace; }
		#quickTest:hover { background: #388bfd; }
		#quickTest:disabled { background: #21262d; border-color: #30363d; color: #8b949e; cursor: default; }
		.summary { font-size: 12px; margin-top: 8px; }
		#list { flex: 1; overflow-y: auto; padding: 8px 12px; }

		.page { margin-bottom: 4px; }
		.page-hdr { display: flex; align-items: center; gap: 7px; padding: 5px 6px; cursor: pointer; border-radius: 4px; font-size: 13px; }
		.page-hdr:hover { background: #161b22; }
		.page-hdr .caret { color: #8b949e; width: 10px; font-size: 10px; transition: transform 0.1s; }
		.page.open .page-hdr .caret { transform: rotate(90deg); }
		.page-hdr .pn { flex: 1; color: #e6edf3; }
		.page-hdr .cnt { font-size: 11px; color: #8b949e; }
		.page-hdr .pdot { width: 9px; height: 9px; border-radius: 50%; background: #3fb950; flex: none; }
		.page-hdr .pdot.untested { background: #484f58; }   /* grey until every test in the page has run */
		.page-hdr .pdot.hasfail { background: #f85149; }
		.page-body { display: none; padding: 2px 0 6px 8px; }
		.page.open .page-body { display: block; }

		.test { display: flex; align-items: center; gap: 6px; padding: 3px 6px; font-size: 12px; border-radius: 3px; }
		.test:hover { background: #161b22; }
		.test .q { color: #58a6ff; cursor: pointer; width: 12px; text-align: center; flex: none; user-select: none; }
		.test .q:hover { color: #79c0ff; }
		.test .dot { width: 8px; height: 8px; border-radius: 50%; background: #484f58; flex: none; }
		.test.pass .dot { background: #3fb950; }
		.test.fail .dot { background: #f85149; }
		.test.running .dot { background: #484f58; }   /* reset to grey while (re)running, before result lands */
		.test .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
		.test.fail .name { color: #f85149; }
		.test .run { background: none; border: 1px solid #30363d; color: #58a6ff; font-size: 10px; padding: 1px 8px; border-radius: 3px; cursor: pointer; font-family: monospace; }
		.test .run:hover { border-color: #58a6ff; }
		.desc { display: none; margin: 2px 6px 6px 30px; padding: 7px 9px; background: #0b1017; border: 1px solid #21262d; border-radius: 4px; font-size: 11.5px; color: #a9b6c2; line-height: 1.5; }
		.desc.open { display: block; }

		/* ---- right: 3D viewport (top) + console (bottom) ---- */
		#viewport { flex: 1; display: flex; flex-direction: column; background: #05070a; min-width: 0; }
		#viewport3d { flex: 1; position: relative; min-height: 0; }
		#viewport3d canvas { display: block; }
		#hud { position: absolute; top: 10px; left: 10px; font-size: 12px; background: rgba(0,0,0,0.65); padding: 8px 10px; border-radius: 4px; max-width: 80%; z-index: 2; }
		#hud .vt { color: #9fe7ff; font-weight: bold; }
		#hud .vv { margin-top: 4px; }
		#hud .vv.pass { color: #3fb950; }
		#hud .vv.fail { color: #f85149; }
		#empty { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #484f58; font-size: 13px; text-align: center; }
		#console { height: 38%; min-height: 120px; overflow-y: auto; border-top: 1px solid #21262d; padding: 8px 12px; font-size: 12px; line-height: 1.5; background: #080b0f; }
		#console .cl { white-space: pre-wrap; }
		#console .cl.info { color: #7d8896; }             /* narration — dimmer so criteria stand out */
		#console .cl.info.hidden { display: none; }
		#console .cl.crit { font-weight: bold; }
		#console .cl.crit.pending { color: #6e7681; }     /* declared, not yet checked */
		#console .cl.crit.pass { color: #3fb950; }
		#console .cl.crit.fail { color: #f85149; }
	</style>

	<!-- vendored three.js (r79) — same one his tests used; NOT an npm dependency. These rarely change,
	     so they're static; everything that DOES change (the engine, runner, tests) is cache-busted below. -->
	<script src="../lib/three.min.js"></script>
	<script src="../lib/ConvexGeometry.js"></script>
	<!-- Engine + runner + test files + renderer are loaded dynamically below with a cache-buster so a
	     rebuilt goblin.js or an edited test always shows fresh on reload (browsers cache goblin.js hard,
	     and reload doesn't always bust it). To add a test file, just list it. -->
	<script>
	(function () {
		var FILES = [
			'../build/goblin.js',   // the engine
			'js/runner.js',
			// Chandler's Suite (one file per his original .html)
			'js/chandler/gravity.js', 'js/chandler/damping.js', 'js/chandler/restitution.js',
			'js/chandler/sphere-sphere.js', 'js/chandler/box-sphere.js', 'js/chandler/balance.js',
			'js/chandler/contact-events.js', 'js/chandler/gjk_spheres.js', 'js/chandler/gjk_boxes.js',
			'js/chandler/support-points.js', 'js/chandler/raytracing.js', 'js/chandler/sweptshapes.js',
			'js/chandler/convexshape.js', 'js/chandler/vector3.js', 'js/chandler/quaternion.js',
			'js/chandler/matrix3.js', 'js/chandler/matrix4.js',
			// Tom's Suite. _util.js first — the tom tests depend on it.
			'js/tom/_util.js',
			'js/tom/shapes-drop.js', 'js/tom/roll.js', 'js/tom/rest.js', 'js/tom/bounce-energy.js',
			'js/tom/entangle.js', 'js/tom/smear.js', 'js/tom/balance.js', 'js/tom/special-shapes.js',
			'js/tom/compound-mesh.js', 'js/tom/swept-mesh-query.js', 'js/tom/swept-shape-matrix.js', 'js/tom/capsule-support.js',
			// FPSCharacterController suites. _util_fps.js first.
			'js/tom/_util_fps.js',
			'js/tom/fps-movement.js', 'js/tom/fps-walls.js', 'js/tom/fps-knockback.js', 'js/tom/fps-push.js',
			'js/tom/fps-ghost.js', 'js/tom/fps-state.js', 'js/tom/fps-ramp.js', 'js/tom/fps-netcode.js',
			'js/tom/fps-ladder.js', 'js/tom/fps-platform.js', 'js/tom/fps-mantle.js',
			// renderer LAST (after all tests are registered)
			'js/render.js'
		];
		FILES.forEach(function (src) { document.write('<script src="' + src + '"><\/script>'); });
	})();
	</script>
</head>
<body>
	<div id="app">
		<div id="sidebar">
			<div class="top">
				<h1>Goblin Physics — Test Suite</h1>
				<div class="controls" id="suitePicker"></div>
				<button id="testNow">Test Now</button>
				<button id="quickTest">Quick Test</button>
				<div class="summary" id="summary">hit Quick Test to run</div>
			</div>
			<div id="list"></div>
		</div>
		<div id="viewport">
			<div id="viewport3d">
				<div id="empty">pick a test's <span style="color:#58a6ff">run</span> — or hit <span style="color:#3fb950">Test Now</span></div>
				<div id="hud" style="display:none"></div>
			</div>
			<div id="console"></div>
		</div>
	</div>

	<script>
	(function () {
		var Runner = window.GoblinRunner, Render = window.GoblinRender;
		var key = function (o) { return o.suite + '|' + o.group + '|' + o.name; };
		var results = {};            // key -> result (dots)
		var rowEls = {};             // key -> row element
		var pageEls = {};            // pageKey -> { tests, dot } for live page-dot recoloring
		var activeSuite = 'all';

		// NO auto-run on load — every dot stays grey until you hit Quick Test (or a row's "run").
		// Running all tests synchronously on load is what used to hang the page.

		var suiteName = {}; Runner.suites().forEach(function (s) { suiteName[s.key] = s.name; });

		// ---- suite picker ----
		var picker = document.getElementById('suitePicker');
		function mkBtn(k, label) {
			var b = document.createElement('button'); b.textContent = label; b.dataset.key = k;
			if (k === activeSuite) b.className = 'active';
			b.onclick = function () { activeSuite = k; renderList(); };
			picker.appendChild(b);
		}
		mkBtn('all', 'All');
		Runner.suites().forEach(function (s) { mkBtn(s.key, s.name); });

		// ---- build the collapsible per-page list ----
		function visibleTests() {
			return Runner.orderedTests().filter(function (t) { return activeSuite === 'all' || t.suite === activeSuite; });
		}
		function renderList() {
			Array.prototype.forEach.call(picker.children, function (b) { b.className = (b.dataset.key === activeSuite) ? 'active' : ''; });
			var list = document.getElementById('list'); list.innerHTML = ''; rowEls = {}; pageEls = {};
			var pass = 0, fail = 0;
			// group visible tests by suite -> page, preserving order
			var lastSuite = null, pageMap = {}, pageOrder = [];
			visibleTests().forEach(function (t) {
				var pk = t.suite + '::' + t.page;
				if (!pageMap[pk]) { pageMap[pk] = { suite: t.suite, page: t.page, tests: [] }; pageOrder.push(pk); }
				pageMap[pk].tests.push(t);
			});
			pageOrder.forEach(function (pk) {
				var pg = pageMap[pk];
				// suite header (only when it changes and we're in "all")
				if (activeSuite === 'all' && pg.suite !== lastSuite) {
					lastSuite = pg.suite;
					var sh = document.createElement('div'); sh.style.cssText = 'color:#ffd24a;font-size:12px;margin:10px 0 4px;';
					sh.textContent = suiteName[pg.suite] || pg.suite; list.appendChild(sh);
				}
				var pageDiv = document.createElement('div'); pageDiv.className = 'page'; // collapsed by default
				var anyFail = pg.tests.some(function (t) { var r = results[key(t)]; return r && !r.ok; });
				var allRun = pg.tests.every(function (t) { return results[key(t)]; });
				// only count tests that actually ran; untested stays neutral
				pg.tests.forEach(function (t) { var r = results[key(t)]; if (r) { r.ok ? pass++ : fail++; } });
				// page dot: grey until every test in it has run, then green/red
				var pdotCls = !allRun ? ' untested' : (anyFail ? ' hasfail' : '');

				var hdr = document.createElement('div'); hdr.className = 'page-hdr';
				hdr.innerHTML = '<span class="caret">▶</span>'
					+ '<span class="pdot' + pdotCls + '"></span>'
					+ '<span class="pn">' + pg.page + '</span>'
					+ '<span class="cnt">' + pg.tests.length + '</span>';
				hdr.onclick = function () { pageDiv.classList.toggle('open'); };
				pageDiv.appendChild(hdr);

				// remember this page's tests + its dot so we can recolor it live (in real time) as
				// individual results land, without a full re-render.
				pageEls[pk] = { tests: pg.tests, dot: hdr.querySelector('.pdot') };

				var body = document.createElement('div'); body.className = 'page-body';
				pg.tests.forEach(function (t) { body.appendChild(mkRow(t)); });
				pageDiv.appendChild(body);
				list.appendChild(pageDiv);
			});
			document.getElementById('summary').innerHTML = (pass + fail === 0)
				? 'hit Quick Test to run'
				: '<b>' + pass + '</b> passed, <b style="color:' + (fail ? '#f85149' : '#3fb950') + '">' + fail + '</b> failed';
		}

		function mkRow(t) {
			var r = results[key(t)];
			var row = document.createElement('div'); row.className = 'test ' + (r ? (r.ok ? 'pass' : 'fail') : '');
			rowEls[key(t)] = row;

			var q = document.createElement('span'); q.className = 'q'; q.textContent = '?';
			var dot = document.createElement('div'); dot.className = 'dot';
			var name = document.createElement('div'); name.className = 'name'; name.textContent = t.name; if (r && !r.ok) name.title = r.error;
			var runBtn = document.createElement('button'); runBtn.className = 'run'; runBtn.textContent = 'run';
			runBtn.onclick = function () { runOne(t); };

			row.appendChild(q); row.appendChild(dot); row.appendChild(name); row.appendChild(runBtn);

			var desc = document.createElement('div'); desc.className = 'desc';
			desc.textContent = t.description || '(no description yet)';
			q.onclick = function () { desc.classList.toggle('open'); };

			var wrap = document.createElement('div');
			wrap.appendChild(row); wrap.appendChild(desc);
			return wrap;
		}

		function setDot(t, state) {
			var el = rowEls[key(t)]; if (el) el.className = 'test ' + state;
			updatePageDot(t.suite + '::' + t.page);
		}
		// Recolor a page's dot from live results, in real time: grey until every test in it has run,
		// then red if any failed, else green.
		function updatePageDot(pk) {
			var pg = pageEls[pk]; if (!pg) return;
			var anyFail = pg.tests.some(function (t) { var r = results[key(t)]; return r && !r.ok; });
			var allRun = pg.tests.every(function (t) { return results[key(t)]; });
			pg.dot.className = 'pdot' + (!allRun ? ' untested' : (anyFail ? ' hasfail' : ''));
		}

		// ---- run one test live ----
		// Reset the dot to grey immediately, then flip to pass/fail only once the checklist has fully
		// revealed (onComplete), so you see it re-evaluate from scratch.
		function runOne(t) {
			setDot(t, 'running');
			Render.run(t, { onComplete: function (r) { results[key(t)] = r; setDot(t, r.ok ? 'pass' : 'fail'); } });
		}

		// ---- Test Now: run the current selection live, one by one ----
		var testNow = document.getElementById('testNow');
		testNow.onclick = function () {
			var list = visibleTests().slice(); var i = 0;
			testNow.disabled = true; testNow.textContent = 'running…';
			// reset all selected dots to grey up front so the whole run visibly re-evaluates
			list.forEach(function (t) { setDot(t, 'running'); });
			(function next() {
				if (i >= list.length) { testNow.disabled = false; testNow.textContent = 'Test Now'; return; }
				var t = list[i++];
				Render.run(t, { fast: true, onComplete: function (r) {
					results[key(t)] = r; setDot(t, r.ok ? 'pass' : 'fail');
					setTimeout(next, t.steps > 0 ? 700 : 120);
				} });
			})();
		};

		// ---- Quick Test: run the current selection HEADLESS (no rendering), flipping dots red/green in
		// real time. Fast — no viewport, no animation, no delays. Yields to the browser between tests so
		// the dots visibly update as it goes instead of freezing until the whole run finishes.
		var quickTest = document.getElementById('quickTest');
		quickTest.onclick = function () {
			var list = visibleTests().slice(); var i = 0;
			quickTest.disabled = true; testNow.disabled = true; quickTest.textContent = 'running…';
			list.forEach(function (t) { setDot(t, 'running'); });   // grey them up front
			var pass = 0, fail = 0;
			(function next() {
				if (i >= list.length) {
					quickTest.disabled = false; testNow.disabled = false; quickTest.textContent = 'Quick Test';
					return;
				}
				var t = list[i++];
				var r = Runner.runOne(t);
				results[key(t)] = r; setDot(t, r.ok ? 'pass' : 'fail');
				r.ok ? pass++ : fail++;
				document.getElementById('summary').innerHTML =
					'<b>' + pass + '</b> passed, <b style="color:' + (fail ? '#f85149' : '#3fb950') + '">' + fail + '</b> failed'
					+ ' <span style="color:#8b949e">(' + i + '/' + list.length + ')</span>';
				setTimeout(next, 0);   // yield so the dot repaints before the next test
			})();
		};

		renderList();
	})();
	</script>
</body>
</html>
